# Copy this file to: ~/.config/confluence-markdown-roundtrip/credentials.toml
# Then: chmod 0600 ~/.config/confluence-markdown-roundtrip/credentials.toml
# The CLI refuses to start if the file is missing or mode is broader than 0600.

# Your Atlassian Cloud site URL (no trailing slash, no /wiki suffix).
base_url = "https://your-tenant.atlassian.net"

# The email address of the Atlassian account the API token was generated for.
email = "you@example.com"

# Generate at https://id.atlassian.com/manage-profile/security/api-tokens
# This is a placeholder; replace with the real token. Never commit the filled-in file.
api_token = "ATATT3xFfGF0_REPLACE_THIS_WITH_YOUR_REAL_TOKEN_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx=DEADBEEF"
